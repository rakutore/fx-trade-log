<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FX Trade Log</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FWFTQRCDM9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-FWFTQRCDM9');
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dbd2;
  --text: #1a1814;
  --muted: #8a8278;
  --accent: #c8392b;
  --accent2: #2b7ac8;
  --green: #2a7a4b;
  --red: #c8392b;
  --gold: #b8960a;
}

/* number inputの矢印を完全に消す */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
  appearance: textfield;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.app-header {
  background: var(--text);
  color: #fff;
  padding: 16px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: #fff;
}

.app-subtitle {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
  margin-top: 2px;
}

.header-date {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

/* Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--text);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
}

.nav-btn {
  flex: 1;
  padding: 12px 8px 10px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}

.nav-btn.active { color: #fff; }
.nav-btn .nav-icon { font-size: 18px; }

/* Pages */
.page { display: none; padding: 20px 16px 140px; }
.page.active { display: block; }

/* Summary cards */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.summary-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
}

.summary-card.full { grid-column: 1 / -1; }

.card-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-family: 'Share Tech Mono', monospace;
}

.card-value {
  font-size: 26px;
  font-weight: 900;
  line-height: 1;
}

.card-value.positive { color: var(--green); }
.card-value.negative { color: var(--red); }
.card-value.neutral { color: var(--text); }

.card-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* Rule bar */
.rule-bar {
  background: var(--surface);
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

.rule-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 10px;
  font-family: 'Share Tech Mono', monospace;
}

.rule-progress {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 6px;
}

.rule-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--green);
  transition: width 0.5s ease;
}

.rule-stats {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}

.rule-pct { font-weight: 700; color: var(--green); }

/* Trade list */
.section-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 12px;
  font-family: 'Share Tech Mono', monospace;
}

.trade-list { display: flex; flex-direction: column; gap: 8px; }

.trade-item {
  background: var(--surface);
  border-radius: 10px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.trade-dir {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'Share Tech Mono', monospace;
}

.trade-dir.buy { background: rgba(43,122,200,0.12); color: var(--accent2); }
.trade-dir.sell { background: rgba(200,57,43,0.12); color: var(--red); }

.trade-info { flex: 1; min-width: 0; }
.trade-pair { font-size: 13px; font-weight: 700; }
.trade-date { font-size: 11px; color: var(--muted); margin-top: 1px; }

.trade-rule {
  font-size: 10px;
  margin-top: 3px;
}
.trade-rule.ok { color: var(--green); }
.trade-rule.ng { color: var(--red); }

.trade-pips {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  text-align: right;
}
.trade-pips.pos { color: var(--green); }
.trade-pips.neg { color: var(--red); }

.trade-memo {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  text-align: right;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Add form */
.form-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
  overflow: hidden;
}

.form-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 16px;
}

.form-group { margin-bottom: 14px; width: 100%; overflow: hidden; }

.form-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: block;
  font-family: 'Share Tech Mono', monospace;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--text);
}

.form-textarea { resize: none; height: 52px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.toggle-group {
  display: flex;
  gap: 8px;
}

.toggle-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--muted);
}

.toggle-btn.selected-buy { background: rgba(43,122,200,0.1); border-color: var(--accent2); color: var(--accent2); font-weight: 700; }
.toggle-btn.selected-sell { background: rgba(200,57,43,0.1); border-color: var(--red); color: var(--red); font-weight: 700; }
.toggle-btn.selected-yes { background: rgba(42,122,75,0.1); border-color: var(--green); color: var(--green); font-weight: 700; }
.toggle-btn.selected-no { background: rgba(200,57,43,0.1); border-color: var(--red); color: var(--red); font-weight: 700; }

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.submit-btn:active { opacity: 0.8; }

/* Monthly */
.month-table {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 16px;
}

.month-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.month-table th {
  background: var(--text);
  color: rgba(255,255,255,0.7);
  padding: 10px 12px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  font-weight: 400;
}

.month-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.month-table tr:last-child td { border-bottom: none; }
.month-table tr:nth-child(even) td { background: var(--surface2); }

.td-pos { color: var(--green); font-weight: 700; }
.td-neg { color: var(--red); font-weight: 700; }
.td-month { font-weight: 700; color: var(--text); }

/* Rules reminder */
.rules-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.rules-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}

.rules-list li {
  display: flex;
  gap: 10px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
}

.rule-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}

/* Rakutore banner */
.rakutore-banner {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 448px;
  background: var(--text);
  border-radius: 14px;
  padding: 20px;
  color: #fff;
  z-index: 90;
  margin: 0;
  box-sizing: border-box;
}

.banner-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.banner-title { font-size: 17px; font-weight: 900; margin-bottom: 6px; line-height: 1.4; }
.banner-desc { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 14px; }
.banner-btn { display: inline-block; padding: 10px 20px; background: #fff; color: var(--text); border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 13px; line-height: 1.7; }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.delete-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; }

</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">FX TRADE LOG</div>
      <div class="app-subtitle">Powered by Rakutore Anchor</div>
    </div>
    <div class="header-date" id="today-date"></div>
  </div>
</header>

<div class="page active" id="page-home">
  <div class="summary-grid">
    <div class="summary-card">
      <div class="card-label">TOTAL PIPS</div>
      <div class="card-value" id="total-pips">+0.0</div>
      <div class="card-sub" id="total-yen">¥0</div>
    </div>
    <div class="summary-card">
      <div class="card-label">WIN RATE</div>
      <div class="card-value neutral" id="win-rate">—</div>
      <div class="card-sub" id="win-loss">0勝 0敗</div>
    </div>
    <div class="summary-card full">
      <div class="card-label">THIS MONTH</div>
      <div class="card-value" id="month-pips">+0.0</div>
      <div class="card-sub" id="month-trades">0トレード</div>
    </div>
  </div>

  <div class="rule-bar">
    <div class="rule-label">RULE COMPLIANCE</div>
    <div class="rule-progress"><div class="rule-fill" id="rule-fill" style="width:0%"></div></div>
    <div class="rule-stats"><span>ルール遵守率</span><span class="rule-pct" id="rule-pct">—</span></div>
  </div>

  <div class="section-title">RECENT TRADES</div>
  <div class="trade-list" id="trade-list"></div>
</div>

<div class="page" id="page-add">
  <div class="form-card">
    <div class="form-title">トレードを記録する</div>
    <div class="form-group">
      <label class="form-label">DATE</label>
      <input type="date" class="form-input" id="input-date">
    </div>
    <div class="form-group">
      <label class="form-label">PAIR</label>
      <select class="form-select" id="input-pair">
        <optgroup label="メジャー">
          <option value="EURUSD">EUR/USD</option>
          <option value="USDJPY">USD/JPY</option>
          <option value="GBPUSD">GBP/USD</option>
          <option value="USDCHF">USD/CHF</option>
          <option value="AUDUSD">AUD/USD</option>
          <option value="USDCAD">USD/CAD</option>
          <option value="NZDUSD">NZD/USD</option>
        </optgroup>
        <optgroup label="クロス円">
          <option value="EURJPY">EUR/JPY</option>
          <option value="GBPJPY">GBP/JPY</option>
          <option value="AUDJPY">AUD/JPY</option>
        </optgroup>
        <optgroup label="その他">
          <option value="GBPAUD">GBP/AUD</option>
          <option value="OTHER">その他</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">DIRECTION</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-buy" onclick="selectDir('BUY')">BUY</button>
        <button class="toggle-btn" id="btn-sell" onclick="selectDir('SELL')">SELL</button>
      </div>
    </div>
    <div class="form-group">
      <div class="form-row">
        <div>
          <label class="form-label">LOTS</label>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="adjustVal('input-lots',-0.01,0.01)" style="width:36px;height:42px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer">▼</button>
            <input type="number" class="form-input" id="input-lots" placeholder="0.01" step="0.01" min="0.01" style="text-align:center">
            <button onclick="adjustVal('input-lots',0.01,0.01)" style="width:36px;height:42px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer">▲</button>
          </div>
        </div>
        <div>
          <label class="form-label">RESULT (pips)</label>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="toggleSign()" id="sign-btn" style="width:42px;height:42px;border:1px solid var(--border);border-radius:8px;background:rgba(200,57,43,0.1);color:var(--red);font-weight:700;cursor:pointer">−</button>
            <input type="number" class="form-input" id="input-pips" placeholder="0.0" step="0.1" oninput="updatePipsPreview()">
          </div>
          <div style="font-size:10px;margin-top:4px;font-family:'Share Tech Mono',monospace" id="pips-preview">— pips</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ルール通りできたか</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-rule-yes" onclick="selectRule('YES')">◯ できた</button>
        <button class="toggle-btn" id="btn-rule-no" onclick="selectRule('NO')">✕ できなかった</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">損切りをいじったか</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-sl-no" onclick="selectSL('NO')">いじらなかった</button>
        <button class="toggle-btn" id="btn-sl-yes" onclick="selectSL('YES')">いじった</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">MEMO</label>
      <textarea class="form-textarea" id="input-memo" placeholder="反省・気づきなど（任意）"></textarea>
    </div>
    <button class="submit-btn" onclick="addTrade()">記録する</button>
  </div>
</div>

<div class="page" id="page-monthly">
  <div class="month-table">
    <table>
      <thead><tr><th>月</th><th>回数</th><th>勝率</th><th>pips</th><th>遵守率</th></tr></thead>
      <tbody id="monthly-tbody"></tbody>
    </table>
  </div>
  <div class="rakutore-banner">
    <div class="banner-tag">// RAKUTORE ANCHOR</div>
    <div class="banner-title">余計なことをしないための管理。</div>
    <div class="banner-desc">エントリーはあなた、その後の管理はEAに任せる。</div>
    <a class="banner-btn" href="https://rakutore.jp/" target="_blank">無料で試す →</a>
  </div>
</div>

<div class="page" id="page-rules">
  <div class="rules-card">
    <div class="section-title">ENTRY RULES</div>
    <ul class="rules-list" id="rules-display"></ul>
    <button class="submit-btn" style="margin-top:14px;background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="showRuleEditor()">ルールを編集する ✏️</button>
  </div>

  <div class="form-card" id="rule-editor" style="display:none">
    <div class="form-title">ルールを編集</div>
    <div id="rule-inputs"></div>
    <div id="add-rule-anchor"></div>
    <button class="submit-btn" style="margin-bottom:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)" onclick="addRuleInput()">＋ ルールを追加</button>
    <button class="submit-btn" style="margin-bottom:10px" onclick="saveRules()">保存する</button>
    <button class="submit-btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="hideRuleEditor()">キャンセル</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('home', this)"><span>📊</span><span>ホーム</span></button>
  <button class="nav-btn" onclick="showPage('add', this)"><span>＋</span><span>記録</span></button>
  <button class="nav-btn" onclick="showPage('monthly', this)"><span>📅</span><span>月次</span></button>
  <button class="nav-btn" onclick="showPage('rules', this)"><span>📋</span><span>ルール</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
let trades = JSON.parse(localStorage.getItem('fx_trades') || '[]');
let selectedDir = null, selectedRule = null, selectedSL = null, pipsSign = -1;
const DEFAULT_RULES = ['MA3本が同じ向き','BBエクスパンション','足確定後にエントリー','ミドル割れで損切り','絶対にいじらない'];
let userRules = JSON.parse(localStorage.getItem('fx_rules') || 'null') || [...DEFAULT_RULES];

// --- Rule Functions (Fix: Delete Support Added) ---
function renderRules() {
  const list = document.getElementById('rules-display');
  list.innerHTML = userRules.map((r, i) => `<li><span class="rule-num">${i+1}.</span><span>${r}</span></li>`).join('');
}

function showRuleEditor() {
  const container = document.getElementById('rule-inputs');
  container.innerHTML = userRules.map((r, i) => createRuleInputHTML(i + 1, r)).join('');
  document.getElementById('rule-editor').style.display = 'block';
  document.querySelector('.rules-card').style.display = 'none';
}

function createRuleInputHTML(num, val = '') {
  return `
    <div class="form-group rule-item-row" style="display:flex; gap:8px; align-items:flex-end; margin-bottom:12px;">
      <div style="flex:1;">
        <label class="form-label">ルール</label>
        <input type="text" class="form-input rule-input" value="${val}" placeholder="ルールを入力">
      </div>
      <button onclick="this.parentElement.remove()" style="width:42px; height:42px; background:rgba(200,57,43,0.1); color:var(--red); border:1px solid var(--border); border-radius:8px; cursor:pointer; flex-shrink:0;">×</button>
    </div>`;
}

function addRuleInput() {
  const container = document.getElementById('rule-inputs');
  const div = document.createElement('div');
  div.innerHTML = createRuleInputHTML(container.children.length + 1);
  container.appendChild(div.firstElementChild);
}

function saveRules() {
  const inputs = document.querySelectorAll('.rule-input');
  userRules = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
  localStorage.setItem('fx_rules', JSON.stringify(userRules));
  hideRuleEditor();
  renderRules();
  showToast('✓ ルールを保存しました');
}

function hideRuleEditor() {
  document.getElementById('rule-editor').style.display = 'none';
  document.querySelector('.rules-card').style.display = 'block';
}

// --- Common UI Functions ---
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'monthly') renderMonthly();
}

function adjustVal(id, delta, decimals) {
  const el = document.getElementById(id);
  const next = Math.max(0, Math.round(((parseFloat(el.value) || 0) + delta) * 100) / 100);
  el.value = next.toFixed(decimals === 0.01 ? 2 : 1);
}

function toggleSign() {
  pipsSign *= -1;
  const btn = document.getElementById('sign-btn');
  btn.textContent = pipsSign > 0 ? '＋' : '−';
  btn.style.color = pipsSign > 0 ? 'var(--green)' : 'var(--red)';
  btn.style.background = pipsSign > 0 ? 'rgba(42,122,75,0.1)' : 'rgba(200,57,43,0.1)';
  updatePipsPreview();
}

function updatePipsPreview() {
  const val = parseFloat(document.getElementById('input-pips').value);
  const preview = document.getElementById('pips-preview');
  if (!val) { preview.textContent = '— pips'; return; }
  preview.textContent = (pipsSign > 0 ? '+' : '-') + val.toFixed(1) + ' pips';
  preview.style.color = pipsSign > 0 ? 'var(--green)' : 'var(--red)';
}

function selectDir(dir) {
  selectedDir = dir;
  document.getElementById('btn-buy').className = 'toggle-btn' + (dir === 'BUY' ? ' selected-buy' : '');
  document.getElementById('btn-sell').className = 'toggle-btn' + (dir === 'SELL' ? ' selected-sell' : '');
}

function selectRule(val) {
  selectedRule = val;
  document.getElementById('btn-rule-yes').className = 'toggle-btn' + (val === 'YES' ? ' selected-yes' : '');
  document.getElementById('btn-rule-no').className = 'toggle-btn' + (val === 'NO' ? ' selected-no' : '');
}

function selectSL(val) {
  selectedSL = val;
  document.getElementById('btn-sl-no').className = 'toggle-btn' + (val === 'NO' ? ' selected-yes' : '');
  document.getElementById('btn-sl-yes').className = 'toggle-btn' + (val === 'YES' ? ' selected-no' : '');
}

// --- Data Functions ---
function addTrade() {
  const date = document.getElementById('input-date').value;
  const pair = document.getElementById('input-pair').value;
  const lots = parseFloat(document.getElementById('input-lots').value);
  const pips = parseFloat(document.getElementById('input-pips').value) * pipsSign;
  if (!date || !selectedDir || isNaN(lots) || isNaN(pips) || !selectedRule) { showToast('⚠️ 入力漏れがあります'); return; }
  
  trades.unshift({ id: Date.now(), date, pair, dir: selectedDir, lots, pips, yen: Math.round(pips * lots * 1000), rule: selectedRule, sl: selectedSL, memo: document.getElementById('input-memo').value });
  localStorage.setItem('fx_trades', JSON.stringify(trades));
  location.reload(); // 簡単のためリロード
}

function deleteTrade(id) {
  trades = trades.filter(t => t.id !== id);
  localStorage.setItem('fx_trades', JSON.stringify(trades));
  render();
}

function render() {
  const now = new Date();
  const thisYear = trades.filter(t => new Date(t.date).getFullYear() === now.getFullYear());
  const totalPips = thisYear.reduce((s, t) => s + t.pips, 0);
  document.getElementById('total-pips').textContent = (totalPips >= 0 ? '+' : '') + totalPips.toFixed(1);
  document.getElementById('total-pips').className = 'card-value ' + (totalPips >= 0 ? 'positive' : 'negative');
  
  const listEl = document.getElementById('trade-list');
  if (trades.length === 0) { listEl.innerHTML = '<div class="empty-state">記録がありません</div>'; return; }
  listEl.innerHTML = trades.slice(0, 10).map(t => `
    <div class="trade-item">
      <div class="trade-dir ${t.dir.toLowerCase()}">${t.dir}</div>
      <div class="trade-info">
        <div class="trade-pair">${t.pair}</div>
        <div class="trade-date">${t.date} · ${t.lots}lot</div>
      </div>
      <div class="trade-pips ${t.pips >= 0 ? 'pos' : 'neg'}">${t.pips >= 0 ? '+' : ''}${t.pips.toFixed(1)}</div>
      <button class="delete-btn" onclick="deleteTrade(${t.id})">×</button>
    </div>`).join('');
}

function renderMonthly() {
  const tbody = document.getElementById('monthly-tbody');
  tbody.innerHTML = '<tr><td colspan="5">データ集計中...</td></tr>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
  render(); renderRules();
});
</script>
